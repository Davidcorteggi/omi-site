<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OMI — ricerca città e via</title>
  <style>
    body{margin:0;font-family:system-ui;background:#0e1117;color:#f8f4ef}.wrap{max-width:1100px;margin:0 auto;padding:24px}.card{background:#161b24;border:1px solid #283041;border-radius:18px;padding:16px;margin:14px 0}input,button,select{padding:10px;border-radius:10px;border:1px solid #334;font:inherit}button{background:#ff8a5b;border:0;font-weight:700}.muted{color:#b8a99c}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.pill{background:#111622;border:1px solid #283041;border-radius:999px;padding:6px 10px;display:inline-block}
    table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #27303c;padding:8px;text-align:right}th:first-child,td:first-child{text-align:left}
    a{color:#fff}
  </style>
</head>
<body>
<div class="wrap">
  <h1>OMI — ricerca città e via</h1>
  <div class="card">
    <div class="row">
      <input id="city" value="Bologna" placeholder="Comune"/>
      <input id="street" value="Via Indipendenza" placeholder="Via"/>
      <select id="utilizzo"><option>Commerciale</option><option>Residenziale</option><option>Terziaria</option><option>Produttiva</option></select>
      <button id="go">Cerca</button>
    </div>
    <div id="status" class="muted" style="margin-top:10px">Pronto.</div>
  </div>
  <div class="card">
    <div id="meta" class="pill">—</div>
    <div style="overflow:auto;margin-top:10px">
      <table><thead><tr><th>Tipologia</th><th>Stato</th><th>Compra min</th><th>Compra max</th><th>Loc min</th><th>Loc max</th></tr></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>
  <div class="card"><ul id="sources"></ul></div>
</div>
<script>
const $=id=>document.getElementById(id);
async function go(){
  $('status').textContent='Ricerca...';
  const u=`/api/omi?city=${encodeURIComponent($('city').value)}&street=${encodeURIComponent($('street').value)}&utilizzo=${encodeURIComponent($('utilizzo').value)}`;
  const r=await fetch(u);
  const j=await r.json();
  if(!r.ok){ $('status').textContent=j.error||'Errore'; return; }
  $('status').textContent='OK';
  $('meta').textContent=`${j.query.city} · ${j.query.zona} · ${j.query.semestre} · ${j.query.utilizzo}`;
  $('tbody').innerHTML=j.rows.map(x=>`<tr><td>${x.tipologia}</td><td>${x.stato}</td><td>${x.compraMin}</td><td>${x.compraMax}</td><td>${x.locMin}</td><td>${x.locMax}</td></tr>`).join('');
  $('sources').innerHTML=j.sources.map(s=>`<li><a target="_blank" rel="noreferrer" href="${s.url}">${s.name}</a></li>`).join('');
}
$('go').onclick=go; go();
</script>
</body>
</html>
